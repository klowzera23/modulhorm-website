<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · ModulHorm</title>
  <style>
    :root { color-scheme: dark; font-family: Arial, sans-serif; background: #0f172a; color: #e5eefb; }
    body { margin: 0; background: radial-gradient(circle at top, #172554 0%, #111827 45%, #020617 100%); min-height: 100vh; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 18px 60px; }
    .card { background: rgba(15,23,42,0.86); border: 1px solid rgba(148,163,184,0.18); border-radius: 24px; padding: 24px; box-shadow: 0 16px 48px rgba(15,23,42,0.35); }
    h1 { margin-top: 0; font-size: 32px; }
    p { color: #cbd5e1; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 18px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(148,163,184,0.18); vertical-align: top; }
    th { color: #f8fafc; background: rgba(30,41,59,0.95); text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    td { color: #e2e8f0; font-size: 14px; }
    .muted { color: #94a3b8; font-size: 12px; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(251,191,36,0.12); color: #fde68a; border: 1px solid rgba(251,191,36,0.25); font-size: 12px; }
    button { border: none; border-radius: 12px; padding: 10px 14px; background: linear-gradient(135deg, #f59e0b, #facc15); color: #111827; font-weight: 700; cursor: pointer; }
    .empty { color: #cbd5e1; padding: 18px; border: 1px dashed rgba(148,163,184,0.25); border-radius: 18px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Panel de contactos</h1>
      <p>Esta vista lee la base de datos SQLite y muestra los mensajes recibidos desde el formulario de la web.</p>
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap;">
        <button id="refreshBtn" type="button">Actualizar</button>
        <span class="badge">Endpoint: /api/contacts</span>
      </div>
      <div id="status" class="muted">Cargando contactos…</div>
      <div id="tableWrap"></div>
    </section>
  </main>
  <script>
    const status = document.getElementById('status');
    const tableWrap = document.getElementById('tableWrap');
    const refreshBtn = document.getElementById('refreshBtn');

    async function loadContacts() {
      status.textContent = 'Cargando contactos…';
      try {
        const response = await fetch('/api/contacts');
        if (!response.ok) throw new Error('No se pudieron cargar los contactos.');
        const contacts = await response.json();
        if (!contacts.length) {
          tableWrap.innerHTML = '<div class="empty">Aún no hay mensajes guardados en la base de datos.</div>';
          status.textContent = '0 contactos registrados.';
          return;
        }

        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Tipo</th>
                <th>Mensaje</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody>
              ${contacts.map(c => `
                <tr>
                  <td>${c.id}</td>
                  <td>${escapeHtml(c.nombre || '-')}</td>
                  <td>${escapeHtml(c.email || '-')}</td>
                  <td>${escapeHtml(c.telefono || '-')}</td>
                  <td>${escapeHtml(c.tipoProyecto || '-')}</td>
                  <td>${escapeHtml(c.mensaje || '-')}</td>
                  <td class="muted">${escapeHtml(c.createdAt || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        status.textContent = `${contacts.length} contacto(s) cargado(s).`;
      } catch (error) {
        status.textContent = error.message;
        tableWrap.innerHTML = '';
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    refreshBtn.addEventListener('click', loadContacts);
    loadContacts();
  </script>
</body>
</html>
